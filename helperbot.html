<!-- helperbot.html
  Incluir en tu layout (por ejemplo antes de </body>):
  <link rel="stylesheet" href="/assets/helperbot.css">
  <script defer src="/assets/helperbot.js"></script>
  Añade la imagen en /assets/helperbot.svg (o cambia la ruta).
-->
<div class="helper-wrap" id="helperWrap" aria-live="polite" aria-atomic="false">
  <div class="helper-bubble" id="helperBubble" role="dialog" aria-label="HelperBot diálogo breve">
    <button class="bubble-close" id="helperClose" aria-label="Cerrar ayuda">&times;</button>
    <div class="bubble-content" id="bubbleContent">
      <strong>Hola — soy HelperBot</strong>
      <div class="bubble-text">¿Cómo te sientes hoy en clase?</div>
      <div class="bubble-actions" role="group" aria-label="Respuestas rápidas">
        <button class="quick-btn" data-answer="Feliz">Feliz</button>
        <button class="quick-btn" data-answer="Tranquilo">Tranquilo</button>
        <button class="quick-btn" data-answer="Preocupado">Preocupado</button>
      </div>
      <a class="help-btn" id="openChat" href="#" role="button">Abrir chat</a>
    </div>
  </div>

  <button class="helper-img-btn" id="helperImgBtn" aria-label="Abrir/cerrar HelperBot">
    <img src="/assets/helperbot.svg" alt="Icono HelperBot" class="helper-img" id="helperImg" aria-hidden="true"/>
  </button>

  <div class="helper-panel" id="helperPanel" aria-hidden="true" role="dialog" aria-label="Chat con HelperBot">
    <div class="panel-header">
      <strong>HelperBot</strong>
      <button class="bubble-close" id="panelClose" aria-label="Cerrar chat">&times;</button>
    </div>
    <div class="panel-body" id="panelBody" role="log" aria-live="polite"></div>
    <form id="panelForm" class="panel-form" aria-label="Enviar mensaje al bot">
      <input id="panelInput" autocomplete="off" placeholder="Escribe aquí..." aria-label="Mensaje" />
      <button type="submit" id="panelSend">Enviar</button>
    </form>
  </div>
</div>

<noscript>
  <div style="position:fixed;bottom:16px;right:16px;background:#fff;padding:.5rem 1rem;border-radius:10px;border:1px solid #ddd;box-shadow:0 4px 12px rgba(0,0,0,.06);font-size:.9rem;z-index:9999;">
    HelperBot funciona mejor con JavaScript habilitado.
  </div>
</noscript>

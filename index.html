<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelperBot – Sistema de Datos para la Formación de Hábitos</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1565C0;
      --blue-lt: #1E88E5;
      --teal:    #00ACC1;
      --green:   #43A047;
      --orange:  #FB8C00;
      --purple:  #8E24AA;
      --red:     #E53935;
      --ink:     #1A1A2E;
      --slate:   #4A5568;
      --mist:    #F0F4FF;
      --white:   #FFFFFF;
      --radius:  16px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      background: #FAFBFF;
      line-height: 1.6;
    }

    /* ───── NAV ───── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #E2E8F0;
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .nav-logo {
      font-family: 'Nunito', sans-serif;
      font-weight: 900; font-size: 1.3rem;
      color: var(--blue);
      display: flex; align-items: center; gap: .5rem;
    }
    .nav-logo span { color: var(--teal); }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a {
      text-decoration: none; font-size: .9rem; font-weight: 600;
      color: var(--slate); transition: color .2s;
    }
    .nav-links a:hover { color: var(--blue); }
    .nav-badge {
      background: var(--blue); color: #fff;
      font-size: .75rem; font-weight: 700;
      padding: .3rem .9rem; border-radius: 99px;
    }

    /* ───── HERO ───── */
    .hero {
      background: linear-gradient(135deg, #0D47A1 0%, #1565C0 40%, #0097A7 100%);
      color: white;
      padding: 6rem 2rem 5rem;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero-eyebrow {
      font-size: .85rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: #90CAF9;
      margin-bottom: 1rem;
    }
    .hero h1 {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 900; line-height: 1.15;
      margin-bottom: .75rem;
    }
    .hero h1 em { font-style: normal; color: #80DEEA; }
    .hero-sub {
      font-size: 1.1rem; color: #BBDEFB;
      max-width: 640px; margin: 0 auto 2.5rem;
    }
    .hero-authors {
      display: inline-flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center;
      background: rgba(255,255,255,.1); border-radius: 12px;
      padding: .75rem 1.5rem; backdrop-filter: blur(8px);
      font-size: .9rem; color: #E3F2FD;
    }
    .hero-authors strong { color: #fff; }
    .hero-chips {
      display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center;
      margin-top: 2rem;
    }
    .chip {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.3);
      color: white; font-size: .8rem; font-weight: 600;
      padding: .4rem 1rem; border-radius: 99px;
    }

    /* ───── SECTIONS ───── */
    section { padding: 4.5rem 1.5rem; }
    .container { max-width: 1080px; margin: 0 auto; }

    .section-label {
      font-size: .78rem; font-weight: 800; letter-spacing: .14em;
      text-transform: uppercase; color: var(--blue-lt);
      margin-bottom: .5rem;
    }
    h2 {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 900; color: var(--ink);
      margin-bottom: 1rem;
    }
    .lead { font-size: 1.05rem; color: var(--slate); max-width: 700px; }

    /* ───── PROBLEM SECTION ───── */
    .problem-bg { background: var(--mist); }
    .causes-effects {
      display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;
      margin-top: 2.5rem;
    }
    .ce-block {
      background: white; border-radius: var(--radius);
      padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .ce-block h3 {
      font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 800;
      margin-bottom: 1rem; display: flex; align-items: center; gap: .6rem;
    }
    .ce-icon { font-size: 1.4rem; }
    .cause-list, .effect-list { list-style: none; display: flex; flex-direction: column; gap: .7rem; }
    .cause-list li, .effect-list li {
      font-size: .93rem; color: var(--slate);
      padding-left: 1.2rem; position: relative;
    }
    .cause-list li::before {
      content: '→'; position: absolute; left: 0;
      color: var(--orange); font-weight: 700;
    }
    .effect-list li::before {
      content: '↳'; position: absolute; left: 0;
      color: var(--red); font-weight: 700;
    }

    .reto-box {
      margin-top: 2.5rem;
      background: linear-gradient(135deg, var(--blue) 0%, var(--teal) 100%);
      border-radius: var(--radius); padding: 2.5rem;
      color: white; text-align: center;
    }
    .reto-box .reto-label {
      font-size: .8rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: #90CAF9; margin-bottom: .75rem;
    }
    .reto-box p {
      font-family: 'Nunito', sans-serif; font-size: 1.3rem; font-weight: 800;
      line-height: 1.4; font-style: italic;
    }

    /* ───── OBJECTIVES ───── */
    .obj-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem; margin-top: 2.5rem;
    }
    .obj-card {
      background: white; border-radius: var(--radius);
      padding: 1.75rem; box-shadow: 0 2px 12px rgba(0,0,0,.06);
      border-top: 4px solid var(--blue);
      transition: transform .2s, box-shadow .2s;
    }
    .obj-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.1); }
    .obj-card:nth-child(2) { border-top-color: var(--teal); }
    .obj-card:nth-child(3) { border-top-color: var(--green); }
    .obj-card:nth-child(4) { border-top-color: var(--orange); }
    .obj-card:nth-child(5) { border-top-color: var(--purple); }
    .obj-card:nth-child(6) { border-top-color: var(--red); }
    .obj-num {
      font-family: 'Nunito', sans-serif; font-size: 2.5rem; font-weight: 900;
      color: #E2E8F0; line-height: 1; margin-bottom: .5rem;
    }
    .obj-card p { font-size: .93rem; color: var(--slate); }

    /* ───── PROCESS (Design Thinking) ───── */
    .process-bg { background: var(--mist); }
    .dt-steps {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem; margin-top: 2.5rem;
    }
    .dt-step {
      background: white; border-radius: var(--radius); padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .dt-badge {
      display: inline-block; font-size: .78rem; font-weight: 800;
      letter-spacing: .08em; text-transform: uppercase;
      padding: .35rem .9rem; border-radius: 99px; margin-bottom: 1rem;
    }
    .dt-badge.inspira  { background: #E3F2FD; color: #1565C0; }
    .dt-badge.genera   { background: #E8F5E9; color: #2E7D32; }
    .dt-badge.escoge   { background: #FFF3E0; color: #E65100; }
    .dt-step h3 {
      font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 800;
      margin-bottom: .75rem; color: var(--ink);
    }
    .dt-step ul { list-style: none; display: flex; flex-direction: column; gap: .5rem; }
    .dt-step ul li {
      font-size: .88rem; color: var(--slate); padding-left: 1.1rem; position: relative;
    }
    .dt-step ul li::before {
      content: '✦'; position: absolute; left: 0; font-size: .6rem;
      color: var(--blue-lt); top: .2rem;
    }

    /* ───── COMPONENTS (HelperBot) ───── */
    .comp-tabs {
      display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 2rem; margin-top: 2rem;
    }
    .tab-btn {
      padding: .55rem 1.2rem; border-radius: 99px; border: 2px solid #E2E8F0;
      background: white; font-size: .88rem; font-weight: 700;
      cursor: pointer; transition: all .2s; color: var(--slate);
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--blue); border-color: var(--blue); color: white;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .comp-card {
      background: white; border-radius: var(--radius);
      padding: 2.5rem; box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    .comp-header {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;
    }
    .comp-icon {
      width: 56px; height: 56px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
      flex-shrink: 0;
    }
    .comp-icon.emotion  { background: #E3F2FD; }
    .comp-icon.routine  { background: #E8F5E9; }
    .comp-icon.helper   { background: #F3E5F5; }
    .comp-icon.exits    { background: #FFF3E0; }
    .comp-header h3 {
      font-family: 'Nunito', sans-serif; font-size: 1.3rem; font-weight: 800;
    }
    .comp-header p { font-size: .9rem; color: var(--slate); }
    .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .comp-item {
      background: var(--mist); border-radius: 12px; padding: 1.25rem;
    }
    .comp-item h4 {
      font-size: .9rem; font-weight: 700; color: var(--ink); margin-bottom: .4rem;
    }
    .comp-item p { font-size: .85rem; color: var(--slate); }

    /* Emotion meter */
    .emotion-row {
      display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem;
    }
    .emo {
      flex: 1; min-width: 100px; background: var(--mist);
      border-radius: 12px; padding: 1rem; text-align: center;
    }
    .emo .e { font-size: 2rem; }
    .emo p { font-size: .8rem; font-weight: 600; color: var(--slate); margin-top: .3rem; }

    /* Helper roles */
    .helper-roles {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
      gap: 1rem; margin-top: 1rem;
    }
    .role-card {
      background: var(--mist); border-radius: 12px; padding: 1rem; text-align: center;
    }
    .role-card .ri { font-size: 1.8rem; margin-bottom: .4rem; }
    .role-card h4 { font-size: .83rem; font-weight: 700; color: var(--ink); }
    .role-card p { font-size: .77rem; color: var(--slate); margin-top: .2rem; }

    /* ───── INDICATORS ───── */
    .indicators-bg { background: var(--ink); color: white; }
    .indicators-bg h2 { color: white; }
    .indicators-bg .section-label { color: var(--teal); }
    .kpi-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 1.5rem; margin-top: 2.5rem;
    }
    .kpi-card {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius); padding: 1.75rem;
    }
    .kpi-emoji { font-size: 2rem; margin-bottom: .75rem; }
    .kpi-dim {
      font-size: .78rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--teal); margin-bottom: .3rem;
    }
    .kpi-card h3 {
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
      color: white; margin-bottom: .5rem;
    }
    .kpi-formula {
      font-size: .78rem; color: #90CAF9; font-family: monospace;
      background: rgba(255,255,255,.06); padding: .4rem .6rem;
      border-radius: 6px; margin-top: .5rem;
    }

    /* ───── IMPACT ───── */
    .impact-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 2rem; margin-top: 2.5rem;
    }
    .impact-card {
      text-align: center; background: white;
      border-radius: var(--radius); padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .impact-card .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .impact-card h3 {
      font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 800;
      margin-bottom: .75rem; color: var(--ink);
    }
    .impact-card ul { list-style: none; }
    .impact-card ul li {
      font-size: .88rem; color: var(--slate);
      padding: .3rem 0; border-bottom: 1px solid #F0F4FF;
    }
    .impact-card ul li:last-child { border: none; }

    /* ───── THEORY ───── */
    .theory-bg { background: var(--mist); }
    .theory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem; }
    .theory-card {
      background: white; border-radius: var(--radius); padding: 1.75rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      border-left: 4px solid var(--blue);
    }
    .theory-card:nth-child(2) { border-left-color: var(--teal); }
    .theory-card:nth-child(3) { border-left-color: var(--green); }
    .theory-card:nth-child(4) { border-left-color: var(--orange); }
    .theory-card h3 {
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
      margin-bottom: .6rem; color: var(--ink);
    }
    .theory-card p { font-size: .88rem; color: var(--slate); }

    /* ───── VALUE ───── */
    .value-banner {
      background: linear-gradient(135deg, #00897B 0%, #1565C0 100%);
      border-radius: var(--radius); padding: 3rem; color: white;
      text-align: center; margin-top: 2rem;
    }
    .value-banner h2 { color: white; font-size: 1.8rem; margin-bottom: 1rem; }
    .value-banner p { color: #E0F7FA; font-size: 1.05rem; max-width: 700px; margin: 0 auto; }
    .value-pillars {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; margin-top: 2rem;
    }
    .pillar {
      background: rgba(255,255,255,.12); border-radius: 12px; padding: 1.5rem;
      text-align: left;
    }
    .pillar .p-num {
      font-family: 'Nunito', sans-serif; font-size: 2rem; font-weight: 900;
      color: rgba(255,255,255,.3); line-height: 1;
    }
    .pillar h4 { font-size: .95rem; font-weight: 700; margin: .4rem 0; }
    .pillar p { font-size: .83rem; color: rgba(255,255,255,.8); }

    /* ───── REFS ───── */
    .refs-bg { background: white; }
    .ref-list { list-style: none; margin-top: 1.5rem; display: flex; flex-direction: column; gap: .75rem; }
    .ref-list li {
      font-size: .88rem; color: var(--slate); padding-left: 1.5rem; position: relative;
      border-left: 2px solid var(--mist); padding: .5rem 0 .5rem 1.2rem;
    }
    .ref-list li strong { color: var(--ink); }

    /* ───── FOOTER ───── */
    footer {
      background: var(--ink); color: #718096; text-align: center;
      padding: 2.5rem 1.5rem; font-size: .85rem;
    }
    footer strong { color: white; }

    /* ───── RESPONSIVE ───── */
    @media (max-width: 768px) {
      .causes-effects, .dt-steps, .comp-grid, .impact-grid,
      .value-pillars, .theory-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
    }
    @media (max-width: 600px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<!-- HelperBot widget: included by Copilot -->
<link rel="stylesheet" href="/assets/helperbot.css">
<script defer src="/assets/helperbot.js"></script>

<div class="helper-wrap" id="helperWrap" aria-live="polite">
  <div class="helper-bubble" id="helperBubble" role="dialog" aria-label="HelperBot">
    <button class="bubble-close" id="helperClose" aria-label="Cerrar ayuda">&times;</button>
    <div class="bubble-content" id="bubbleContent">
      <strong>Hola — soy HelperBot</strong>
      <div class="bubble-text">¿Cómo te sientes hoy en clase?</div>
      <div class="bubble-actions">
        <button class="quick-btn" data-answer="Feliz">Feliz</button>
        <button class="quick-btn" data-answer="Tranquilo">Tranquilo</button>
        <button class="quick-btn" data-answer="Preocupado">Preocupado</button>
      </div>
      <a class="help-btn" id="openChat" href="#" role="button">Abrir chat</a>
    </div>
  </div>

  <img src="/assets/helperbot.svg" alt="HelperBot" class="helper-img" id="helperImg" />

  <div class="helper-panel" id="helperPanel" aria-hidden="true" role="dialog" aria-label="Chat con HelperBot">
    <div class="panel-header">
      <strong>HelperBot</strong>
      <button class="bubble-close" id="panelClose" aria-label="Cerrar chat">&times;</button>
    </div>
    <div class="panel-body" id="panelBody" role="log"></div>
    <form id="panelForm" class="panel-form" aria-label="Enviar mensaje">
      <input id="panelInput" autocomplete="off" placeholder="Escribe aquí..." />
      <button type="submit" id="panelSend">Enviar</button>
    </form>
  </div>
</div>
